<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link href="https://unpkg.com/survey-core/survey-core.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }
    #survey-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      box-sizing: border-box;
    }
    #lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .lang-btn {
      padding: 0.25rem 0.65rem;
      border: 1px solid #cbd5e0;
      border-radius: 99px;
      background: #fff;
      color: #718096;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover  { border-color: #4a6fa5; color: #4a6fa5; }
    .lang-btn.active { border-color: #4a6fa5; background: #4a6fa5; color: #fff; }
  </style>
</head>
<body>
  <div id="survey-wrap">
    <div id="lang-bar">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <div id="survey-container"></div>
  </div>

  <script src="https://unpkg.com/survey-core/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui/survey-js-ui.min.js"></script>
  <script>
    var schema          = {{ schema | tojson }};
    var slug            = {{ slug  | tojson }};
    var assigned_pages  = {{ assigned_pages | tojson }};
    var pool_pages      = {{ pool_pages | tojson }};
    var conditions      = {{ conditions | tojson }};
    var LANGS           = ["en", "de", "fr", "it"];

    // Scan schema recursively for locale keys inside localized string objects.
    // A localized string object has all-string values and at least one key that
    // is a known locale code or "default".
    function getAvailableLocales(obj) {
      var found = {};
      function isLocaleObj(o) {
        if (!o || typeof o !== "object" || Array.isArray(o)) return false;
        var keys = Object.keys(o);
        return keys.length > 0
          && keys.every(function(k) { return typeof o[k] === "string"; })
          && keys.some(function(k) { return k === "default" || LANGS.indexOf(k) !== -1; });
      }
      function walk(val) {
        if (!val || typeof val !== "object") return;
        if (Array.isArray(val)) { val.forEach(walk); return; }
        if (isLocaleObj(val)) {
          Object.keys(val).forEach(function(k) {
            if (LANGS.indexOf(k) !== -1) found[k] = true;
            if (k === "default")         found["en"] = true; // default maps to EN
          });
        } else {
          Object.keys(val).forEach(function(k) { walk(val[k]); });
        }
      }
      walk(obj);
      return LANGS.filter(function(l) { return found[l]; });
    }

    function detectLocale(available) {
      var lang = (navigator.language || "en").split("-")[0].toLowerCase();
      return available.indexOf(lang) !== -1 ? lang : available[0];
    }

    function setLocale(survey, lang) {
      survey.locale = lang === "en" ? "" : lang;
      document.querySelectorAll(".lang-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.addEventListener("DOMContentLoaded", function() {
      var survey = new Survey.Model(schema);

      // --- randomization: hide non-assigned pool pages ---
      if (assigned_pages && pool_pages) {
        survey.pages.forEach(function(page) {
          if (pool_pages.indexOf(page.name) !== -1 && assigned_pages.indexOf(page.name) === -1) {
            page.visible = false;
          }
        });
      }

      // --- condition variables ---
      // If the server supplied explicit conditions (pool.condition_var configured),
      // use those directly. Otherwise fall back to the legacy convention:
      // a pool page named 'info_X' (single letter) → condition = 'X'.
      // survey.setVariable() makes variables available in visibleIf expressions
      // without polluting response data; values are captured in onComplete below.
      if (conditions && Object.keys(conditions).length > 0) {
        Object.keys(conditions).forEach(function(k) { survey.setVariable(k, conditions[k]); });
      } else if (assigned_pages) {
        for (var i = 0; i < assigned_pages.length; i++) {
          var m = assigned_pages[i].match(/^info_([a-z])$/i);
          if (m) { survey.setVariable('condition', m[1].toUpperCase()); break; }
        }
      }

      // --- timing ---
      var t0          = Date.now();   // survey start
      var pageT0      = Date.now();   // current page start
      var pageTimes   = {};

      survey.onCurrentPageChanged.add(function(sender, options) {
        var secs = Math.round((Date.now() - pageT0) / 1000);
        pageTimes[options.oldCurrentPage.name] = secs;
        pageT0 = Date.now();
      });

      // Build language bar with only available locales
      var available = getAvailableLocales(schema);
      var bar = document.getElementById("lang-bar");
      if (available.length <= 1) {
        bar.style.display = "none";
      } else {
        bar.querySelectorAll(".lang-btn").forEach(function(btn) {
          if (available.indexOf(btn.dataset.lang) === -1) btn.style.display = "none";
        });
      }

      var locale = detectLocale(available.length ? available : ["en"]);
      setLocale(survey, locale);

      document.querySelectorAll(".lang-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          setLocale(survey, btn.dataset.lang);
        });
      });

      survey.onComplete.add(function(sender, options) {
        // record last page
        pageTimes[sender.currentPage.name] = Math.round((Date.now() - pageT0) / 1000);

        var payload = Object.assign({}, sender.data, {
          _timing: {
            total_seconds: Math.round((Date.now() - t0) / 1000),
            pages: pageTimes
          }
        });
        if (assigned_pages) payload._assignment = assigned_pages.join(",");
        if (conditions && Object.keys(conditions).length > 0) {
          payload._conditions = conditions;
        } else {
          var cond = survey.getVariable('condition');
          if (cond) payload._condition = cond;
        }

        options.showSaveInProgress();
        fetch('/s/' + slug + '/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(function(r) {
          if (r.ok) { options.showSaveSuccess(); } else { options.showSaveError(); }
        })
        .catch(function() { options.showSaveError(); });
      });

      survey.render(document.getElementById('survey-container'));
    });
  </script>
</body>
</html>
