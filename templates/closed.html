<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survey not available</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
      padding: 3rem 2.5rem; text-align: center; max-width: 380px; width: 100%;
    }
    h2 { font-size: 1.1rem; color: #e2e8f0; margin-bottom: 0.6rem; }
    p  { font-size: 0.875rem; color: #718096; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Survey not available</h2>
    <p>This survey is closed or the link is no longer valid.</p>
  </div>
</body>
</html>
