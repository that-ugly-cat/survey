<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survey — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
    }
    .card {
      width: 100%; max-width: 340px; padding: 2.5rem 2rem;
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
    }
    .brand { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    .sub   { font-size: 0.78rem; color: #718096; margin-bottom: 2rem; }
    label  { display: block; font-size: 0.75rem; color: #a0aec0; margin-bottom: 0.35rem; margin-top: 1rem; }
    input  {
      width: 100%; padding: 0.6rem 0.8rem;
      background: #0f1117; border: 1px solid #2d3148; border-radius: 6px;
      color: #e2e8f0; font-size: 0.9rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #4a6fa5; }
    button {
      width: 100%; margin-top: 1.6rem; padding: 0.65rem;
      background: #0a3c8a; color: #fff; border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #0d4fa8; }
    .error {
      margin-top: 1rem; padding: 0.6rem 0.8rem;
      background: #2d1515; border: 1px solid #7b2020; border-radius: 6px;
      font-size: 0.82rem; color: #fc8181;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Survey Admin</div>
    <div class="sub">survey.borant.eu</div>
    {% if error %}<div class="error">Wrong password.</div>{% endif %}
    <form method="post" action="/login">
      <label>Password</label>
      <input type="password" name="password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
